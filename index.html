<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROL DEL MILLÓN | Terminal</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23030712%22 stroke=%22%2300e676%22 stroke-width=%228%22/><text y=%22.68em%22 x=%2250%25%22 font-family=%22monospace%22 font-size=%2255%22 font-weight=%22bold%22 fill=%22%2300e676%22 text-anchor=%22middle%22>%24</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #01060b;
            --bg-panel: rgba(10, 16, 26, 0.7);
            --accent-emerald: #00fa9a;
            --accent-emerald-dark: #008f58;
            --accent-cyan: #00e5ff;
            --accent-amber: #ffb300;
            --text-main: #f3f4f6;
            --text-muted: #8b949e;
            --border-glow: rgba(0, 250, 154, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Fondo Interactivo y Marcado */
        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%; left: -20%; width: 140%; height: 140%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(0, 250, 154, 0.08), transparent 40%),
                radial-gradient(circle at 70% 70%, rgba(0, 143, 88, 0.06), transparent 45%);
            animation: rotateGlow 25s ease-in-out infinite alternate;
            z-index: -1;
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(15deg) scale(1.1); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header Centrado */
        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 20%, var(--accent-emerald));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(0, 250, 154, 0.2);
        }

        /* Layout Grid para Escritorio vs Celular */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 900px) {
            .dashboard-layout {
                grid-template-columns: 340px 1fr;
                align-items: start;
            }
        }

        /* Panel Izquierdo (Controles y KPIs) */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: sticky;
            top: 2rem;
        }

        .tab-slider {
            display: flex;
            background: rgba(4, 9, 15, 0.8);
            border: 1px solid var(--border-glow);
            padding: 0.35rem;
            border-radius: 16px;
            backdrop-filter: blur(12px);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 1rem;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: rgba(0, 250, 154, 0.1);
            color: var(--accent-emerald);
            border: 1px solid rgba(0, 250, 154, 0.4);
            box-shadow: 0 0 20px rgba(0, 250, 154, 0.15);
        }

        .summary-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
        }

        .summary-item {
            margin-bottom: 1.2rem;
        }
        .summary-item:last-child {
            margin-bottom: 0;
            padding-top: 1.2rem;
            border-top: 1px dashed rgba(255,255,255,0.1);
        }

        .summary-item span {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: block;
            margin-bottom: 0.3rem;
        }

        .summary-item p {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .summary-item.green p {
            color: var(--accent-emerald);
            text-shadow: 0 0 15px rgba(0, 250, 154, 0.3);
        }

        /* Panel Derecho (Lista de Gastos Extensible) */
        .items-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        @media (min-width: 1100px) {
            .items-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .card-item {
            background: var(--bg-panel);
            border: 1px solid rgba(255,255,255,0.03);
            border-left: 3px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .card-item:hover {
            border-left: 3px solid var(--accent-emerald);
            background: rgba(15, 25, 40, 0.8);
            transform: translateX(4px);
        }

        .card-details {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
        }

        .tag {
            display: inline-block;
            align-self: flex-start;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .tag-seg { background: rgba(0, 229, 255, 0.1); color: var(--accent-cyan); }
        .tag-deuda { background: rgba(255, 179, 0, 0.1); color: var(--accent-amber); }
        .tag-fijo { background: rgba(156, 163, 175, 0.1); color: #d1d5db; }

        .card-amount {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffffff;
        }

        /* Módulo Futuro */
        .collapsible-wrapper {
            background: rgba(4, 9, 15, 0.6);
            border: 1px dashed rgba(0, 250, 154, 0.3);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 250, 154, 0.02);
        }

        .collapsible-trigger {
            width: 100%;
            background: transparent;
            border: none;
            padding: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            color: var(--accent-emerald);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .collapsible-content {
            padding: 0 1.2rem 1.2rem 1.2rem;
            display: none;
            flex-direction: column;
            gap: 1rem;
            border-top: 1px solid rgba(0, 250, 154, 0.1);
        }

        .future-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
        }
        
        .future-row h4 { font-size: 0.85rem; font-weight: 600; color: #e5e7eb; }
        .future-row p { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.2rem;}
        .future-val { font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--accent-emerald);}

        @keyframes fadeInList {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animated-grid {
            animation: fadeInList 0.4s ease forwards;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>CONTROL DEL MILLÓN</h1>
        </header>

        <div class="dashboard-layout">
            
            <div class="control-panel">
                <div class="tab-slider">
                    <button class="tab-btn active" onclick="switchQuincena(15)">Corte 15</button>
                    <button class="tab-btn" onclick="switchQuincena(30)">Corte 30</button>
                </div>

                <div class="summary-card">
                    <div class="summary-item">
                        <span>Ingreso Base</span>
                        <p>₡410,000</p>
                    </div>
                    <div class="summary-item green">
                        <span>Balance Neto</span>
                        <p id="surplus-display">₡0</p>
                    </div>
                </div>

                <div class="collapsible-wrapper">
                    <button class="collapsible-trigger" onclick="toggleFuturePanel()">
                        <span>Estructura Independiente</span>
                        <span id="arrow-icon">+</span>
                    </button>
                    <div class="collapsible-content" id="future-panel-content">
                        <div class="future-row">
                            <div>
                                <h4>CCSS Trabajador Independiente</h4>
                                <p>Cuota sobre base mínima</p>
                            </div>
                            <div class="future-val">~₡30,000</div>
                        </div>
                        <div class="future-row">
                            <div>
                                <h4>Facturador Electrónico</h4>
                                <p>Suscripción plataforma</p>
                            </div>
                            <div class="future-val">~₡3,000</div>
                        </div>
                        <div class="future-row">
                            <div>
                                <h4>Retención IVA (13%)</h4>
                                <p>Impuesto cobrado al cliente</p>
                            </div>
                            <div class="future-val" style="color:var(--text-muted);">Variable</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="items-grid" id="flow-wrapper">
                </div>

        </div>
    </div>

    <script>
        // Datos limpios y ordenados según tu solicitud
        const corte15 = [
            { name: "A Cuenta 2 (Ocio)", type: "Segregación", amount: "₡30,000" },
            { name: "A Cuenta 3 (Gastos del Carro)", type: "Segregación", amount: "₡45,000" },
            { name: "A Cuenta 4 (Objetivo: Tu Millón)", type: "Segregación", amount: "₡5,000" },
            { name: "Comida", type: "Gasto Fijo", amount: "₡50,000" },
            { name: "Tarjetas de Crédito", type: "Deuda Fija", amount: "₡174,000" },
            { name: "Abono Deuda Mamá", type: "Deuda Fija", amount: "₡10,000" },
            { name: "Cochera", type: "Gasto Fijo", amount: "₡30,000" },
            { name: "Teléfono", type: "Gasto Fijo", amount: "₡43,278" },
            { name: "Teléfono Mamá", type: "Gasto Fijo", amount: "₡12,896" },
            { name: "Google Workspace", type: "Gasto Fijo", amount: "₡6,578" },
            { name: "Seguro SOS", type: "Gasto Fijo", amount: "₡3,200" }
        ];

        const corte30 = [
            { name: "A Cuenta 2 (Ocio)", type: "Segregación", amount: "₡40,000" },
            { name: "A Cuenta 3 (Gastos del Carro)", type: "Segregación", amount: "₡45,000" },
            { name: "A Cuenta 4 (Objetivo: Tu Millón)", type: "Segregación", amount: "₡5,000" },
            { name: "Comida", type: "Gasto Fijo", amount: "₡55,500" },
            { name: "Pago Copecaja", type: "Deuda Fija", amount: "₡115,500" },
            { name: "Pago INS", type: "Deuda Fija", amount: "₡49,000" },
            { name: "Pago Casa (Papá)", type: "Deuda Fija", amount: "₡50,000" },
            { name: "Abono Deuda (Papá)", type: "Deuda Fija", amount: "₡50,000" }
        ];

        function getTagStyle(type) {
            if (type === "Segregación") return "tag-seg";
            if (type === "Deuda Fija") return "tag-deuda";
            return "tag-fijo";
        }

        function renderMatrix(data) {
            const wrapper = document.getElementById('flow-wrapper');
            wrapper.innerHTML = data.map(item => `
                <div class="card-item">
                    <div class="card-details">
                        <span class="card-title">${item.name}</span>
                        <span class="tag ${getTagStyle(item.type)}">${item.type}</span>
                    </div>
                    <div class="card-amount">${item.amount}</div>
                </div>
            `).join('');
        }

        function switchQuincena(day) {
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const wrapper = document.getElementById('flow-wrapper');
            wrapper.classList.remove('animated-grid');
            void wrapper.offsetWidth; 
            wrapper.classList.add('animated-grid');

            renderMatrix(day === 15 ? corte15 : corte30);
        }

        function toggleFuturePanel() {
            const content = document.getElementById('future-panel-content');
            const icon = document.getElementById('arrow-icon');
            if (content.style.display === 'flex') {
                content.style.display = 'none';
                icon.innerText = '+';
            } else {
                content.style.display = 'flex';
                icon.innerText = '-';
            }
        }

        window.onload = () => { renderMatrix(corte15); };
    </script>
</body>
</html>
