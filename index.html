<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V6 | TERMINAL DE FLUJO</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #05070f;
            --bg-card: rgba(18, 24, 38, 0.65);
            --accent-emerald: #00e676;
            --accent-cyan: #00e5ff;
            --accent-amber: #ffb300;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-glow: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            min-height: 100vh;
            padding: 1.25rem 1rem;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 229, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(0, 230, 118, 0.03) 0%, transparent 50%);
            background-attachment: fixed;
        }

        .wrapper {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Header Futurista */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 0 0.5rem;
        }

        header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 30%, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-pulse {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent-emerald);
            letter-spacing: 0.05em;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-emerald);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-emerald);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(0, 230, 118, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); }
        }

        /* Selector Quincenal de Alta Respuesta */
        .selector-bar {
            display: flex;
            background: rgba(13, 18, 30, 0.9);
            border: 1px solid var(--border-glow);
            padding: 0.3rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
        }

        .selector-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.9rem;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .selector-btn.active {
            background: #fff;
            color: #000;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        /* KPI Cards Optimizadas */
        .kpi-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .kpi-box {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 18px;
            padding: 1.2rem;
            backdrop-filter: blur(10px);
        }

        .kpi-box span {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 0.25rem;
        }

        .kpi-box p {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .kpi-box.emerald p {
            color: var(--accent-emerald);
            text-shadow: 0 0 10px rgba(0, 230, 118, 0.2);
        }

        /* Lista de Transacciones Móvil-First */
        .flow-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .flow-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 1.1rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: transform 0.2s ease;
        }

        .flow-card:active {
            transform: scale(0.98);
        }

        .flow-info {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            max-width: 65%;
        }

        .flow-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            display: inline-block;
            align-self: flex-start;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .badge-seg { background: rgba(0, 229, 255, 0.1); color: var(--accent-cyan); }
        .badge-deuda { background: rgba(255, 179, 0, 0.1); color: var(--accent-amber); }
        .badge-fijo { background: rgba(156, 163, 175, 0.1); color: #d1d5db; }

        .flow-val {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            text-align: right;
            white-space: nowrap;
        }

        /* Módulo Futuro Colapsable (Épico) */
        .collapsible-wrapper {
            background: rgba(13, 18, 30, 0.4);
            border: 1px dashed rgba(0, 229, 255, 0.2);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .collapsible-trigger {
            width: 100%;
            background: transparent;
            border: none;
            padding: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            color: var(--accent-cyan);
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .collapsible-content {
            padding: 0 1.2rem 1.2rem 1.2rem;
            display: none;
            flex-direction: column;
            gap: 1rem;
            border-top: 1px solid rgba(0, 229, 255, 0.05);
            animation: fadeIn 0.3s ease forwards;
        }

        .future-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .future-row p { color: var(--text-muted); font-size: 0.8rem; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>Terminal V6</h1>
            <div class="status-pulse">
                <div class="pulse-dot"></div>
                <span>Matriz Activa</span>
            </div>
        </header>

        <div class="selector-bar">
            <button class="selector-btn active" onclick="switchTab(15)">Día 15</button>
            <button class="selector-btn" onclick="switchTab(30)">Día 30</button>
        </div>

        <div class="kpi-row">
            <div class="kpi-box">
                <span>Ingreso Neto</span>
                <p>₡410,000</p>
            </div>
            <div class="kpi-box emerald">
                <span>Balance C1</span>
                <p>₡0</p>
            </div>
        </div>

        <div class="flow-list" id="main-flow-container">
            </div>

        <div class="collapsible-wrapper">
            <button class="collapsible-trigger" onclick="toggleFuturePanel()">
                <span>👁️ Proyección Hacienda</span>
                <span id="arrow-status">+ Expandir</span>
            </button>
            <div class="collapsible-content" id="future-panel-content">
                <div class="future-row">
                    <div>
                        <strong style="font-size:0.9rem; display:block;">CCSS Independiente</strong>
                        <p>Seguro base de desarrollo</p>
                    </div>
                    <span style="font-family:'Space Grotesk'; font-weight:700; color:var(--accent-cyan);">~₡30,000</span>
                </div>
                <div class="future-row">
                    <div>
                        <strong style="font-size:0.9rem; display:block;">Facturación Electrónica</strong>
                        <p>Licencia profesional digital</p>
                    </div>
                    <span style="font-family:'Space Grotesk'; font-weight:700; color:var(--accent-cyan);">~₡3,000</span>
                </div>
                <div style="font-size: 0.75rem; text-align: center; color: var(--text-muted); background: rgba(255,255,255,0.02); padding: 0.6rem; border-radius: 8px;">
                    Financiado de forma autónoma por adelantos de proyectos.
                </div>
            </div>
        </div>
    </div>

    <script>
        const data15 = [
            { name: "A Cuenta 2 (Ocio / Marihuana)", type: "Segregación", amount: "₡30,000" },
            { name: "A Cuenta 3 (Carro: Gasolina + Reserva)", type: "Segregación", amount: "₡45,000" },
            { name: "A Cuenta 4 (Objetivo: Tu Millón)", type: "Segregación", amount: "₡5,000" },
            { name: "Tarjetas de Crédito (4 Pagos Auditados)", type: "Deuda Fija", amount: "₡174,000" },
            { name: "Abono Deuda Mamá", type: "Deuda Fija", amount: "₡10,000" },
            { name: "Cochera", type: "Gasto Fijo", amount: "₡30,000" },
            { name: "Teléfono Tuyo (Claro Exacto)", type: "Gasto Fijo", amount: "₡43,278" },
            { name: "Teléfono Mamá (Claro Exacto)", type: "Gasto Fijo", amount: "₡12,896" },
            { name: "Google Workspace (Dominio + Pro)", type: "Gasto Fijo", amount: "₡6,578" },
            { name: "Seguro SOS (Asistencia / Clavos)", type: "Gasto Fijo", amount: "₡3,200" },
            { name: "Comida (Asignación Fija)", type: "Gasto Fijo", amount: "₡50,000" }
        ];

        const data30 = [
            { name: "A Cuenta 2 (Ocio Mínimo)", type: "Segregación", amount: "₡40,000" },
            { name: "A Cuenta 3 (Carro: Gasolina + Reserva)", type: "Segregación", amount: "₡45,000" },
            { name: "A Cuenta 4 (Objetivo: Tu Millón)", type: "Segregación", amount: "₡5,000" },
            { name: "Pago Total Copecaja (Préstamo)", type: "Deuda Fija", amount: "₡115,500" },
            { name: "Pago Directo al INS", type: "Deuda Fija", amount: "₡49,000" },
            { name: "Pago Único a Papá (Casa + Deuda)", type: "Deuda Fija", amount: "₡100,000" },
            { name: "Comida (Quincena)", type: "Gasto Fijo", amount: "₡55,500" }
        ];

        function getBadgeClass(type) {
            if (type === "Segregación") return "badge-seg";
            if (type === "Deuda Fija") return "badge-deuda";
            return "badge-fijo";
        }

        function renderList(data) {
            const container = document.getElementById('main-flow-container');
            container.innerHTML = data.map(item => `
                <div class="flow-card">
                    <div class="flow-info">
                        <span class="flow-name">${item.name}</span>
                        <span class="badge ${getBadgeClass(item.type)}">${item.type}</span>
                    </div>
                    <div class="flow-val">${item.amount}</div>
                </div>
            `).join('');
        }

        function switchTab(day) {
            const buttons = document.querySelectorAll('.selector-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const container = document.getElementById('main-flow-container');
            container.style.animation = 'none';
            void container.offsetHeight; // Trigger reflow
            container.style.animation = 'fadeIn 0.3s ease forwards';

            renderList(day === 15 ? data15 : data30);
        }

        function toggleFuturePanel() {
            const content = document.getElementById('future-panel-content');
            const arrow = document.getElementById('arrow-status');
            if (content.style.display === 'flex') {
                content.style.display = 'none';
                arrow.innerText = '+ Expandir';
            } else {
                content.style.display = 'flex';
                arrow.innerText = '- Ocultar';
            }
        }

        // Render inicial
        window.onload = () => { renderList(data15); };
    </script>
</body>
</html>
