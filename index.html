<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte del Millón | Control de Flujo</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: rgba(22, 30, 49, 0.7);
            --border-glow: rgba(0, 230, 118, 0.15);
            --accent-green: #00e676;
            --accent-gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem 1rem;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 230, 118, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 215, 0, 0.03) 0%, transparent 40%);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .toggle-container {
            display: flex;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--glass-border);
            padding: 0.4rem;
            border-radius: 14px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .toggle-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toggle-btn.active {
            background: var(--accent-green);
            color: var(--bg-main);
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.4);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .summary-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.2rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .summary-card h3 {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .summary-card p {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .summary-card.income p { color: var(--text-primary); }
        .summary-card.surplus p { color: var(--accent-green); }

        .matrix-box {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .matrix-box h2 {
            font-size: 1.25rem;
            margin-bottom: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
        }

        td.amount {
            font-weight: 600;
            text-align: right;
        }

        .tag {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .tag-segregacion { background: rgba(0, 230, 118, 0.15); color: var(--accent-green); }
        .tag-deuda { background: rgba(255, 215, 0, 0.15); color: var(--accent-gold); }
        .tag-fijo { background: rgba(148, 163, 184, 0.15); color: #cbd5e1; }

        tr:last-child td {
            border-bottom: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animated-view {
            animation: fadeIn 0.4s ease forwards;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>SOPORTE DEL MILLÓN</h1>
            <p>Estructura y Dominio de Flujo Quincenal</p>
        </header>

        <div class="toggle-container">
            <button class="toggle-btn active" onclick="switchView(15)">Corte de los 15</button>
            <button class="toggle-btn" onclick="switchView(30)">Corte de los 30</button>
        </div>

        <div class="summary-grid">
            <div class="summary-card income">
                <h3>Ingreso Neto Quincenal</h3>
                <p>₡410,000</p>
            </div>
            <div class="summary-card surplus">
                <h3>Sobrante en Cuenta 1</h3>
                <div id="surplus-amount"><p>₡48,048</p></div>
            </div>
        </div>

        <div class="matrix-box">
            <h2 id="matrix-title">Distribución del Día 15</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Concepto / Destino</th>
                            <th>Tipo Acción</th>
                            <th style="text-align: right;">Monto</th>
                        </tr>
                    </thead>
                    <tbody id="matrix-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const data15 = [
            { name: "A Cuenta 2 (Ocio / Marihuana)", type: "Segregación", amount: "₡40,000" },
            { name: "A Cuenta 3 (Carro: Gasolina + Reserva)", type: "Segregación", amount: "₡45,000" },
            { name: "A Cuenta 4 (Objetivo: Tu Millón)", type: "Segregación", amount: "₡5,000" },
            { name: "Tarjetas de Crédito (Mínimos Auditados)", type: "Deuda Fija", amount: "₡106,000" },
            { name: "Abono Deuda Mamá", type: "Deuda Fija", amount: "₡10,000" },
            { name: "Cochera", type: "Gasto Fijo", amount: "₡30,000" },
            { name: "Teléfono Tuyo (Claro Postpago)", type: "Gasto Fijo", amount: "₡43,278" },
            { name: "Teléfono Mamá (Claro Postpago)", type: "Gasto Fijo", amount: "₡12,896" },
            { name: "Google Workspace (Apex + Gemini Pro)", type: "Gasto Fijo", amount: "₡6,578" },
            { name: "Seguro SOS (Asistencia Carretera)", type: "Gasto Fijo", amount: "₡3,200" },
            { name: "Comida (Quincenal Real)", type: "Gasto Fijo", amount: "₡60,000" }
        ];

        const data30 = [
            { name: "A Cuenta 2 (Ocio / Marihuana)", type: "Segregación", amount: "₡40,000" },
            { name: "A Cuenta 3 (Carro: Gasolina + Reserva)", type: "Segregación", amount: "₡45,000" },
            { name: "A Cuenta 4 (Objetivo: Tu Millón)", type: "Segregación", amount: "₡5,000" },
            { name: "Pago Total Copecaja (Préstamo + Capital)", type: "Deuda Fija", amount: "₡115,500" },
            { name: "Pago Directo al INS", type: "Deuda Fija", amount: "₡49,000" },
            { name: "Pago Único a Papá (Casa + Deuda)", type: "Deuda Fija", amount: "₡100,000" },
            { name: "Comida (Quincena)", type: "Gasto Fijo", amount: "₡55,500" },
            { name: "🚨 FUTURO: CCSS Independiente (Fase Desarrollo)", type: "Gasto Fijo", amount: "~₡30,000" }
        ];

        function getTagClass(type) {
            if (type === "Segregación") return "tag-segregacion";
            if (type === "Deuda Fija") return "tag-deuda";
            return "tag-fijo";
        }

        function switchView(day) {
            const buttons = document.querySelectorAll('.toggle-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const tbody = document.getElementById('matrix-body');
            const title = document.getElementById('matrix-title');
            const surplus = document.getElementById('surplus-amount');
            
            tbody.classList.remove('animated-view');
            void tbody.offsetWidth;
            tbody.classList.add('animated-view');

            let currentData = day === 15 ? data15 : data30;
            title.innerText = `Distribución del Día ${day}`;
            surplus.innerHTML = day === 15 ? `<p>₡48,048</p>` : `<p style="color: #cbd5e1;">₡0</p>`;

            tbody.innerHTML = currentData.map(item => `
                <tr>
                    <td>${item.name}</td>
                    <td><span class="tag ${getTagClass(item.type)}">${item.type}</span></td>
                    <td class="amount">${item.amount}</td>
                </tr>
            `).join('');
        }

        window.onload = () => {
            const tbody = document.getElementById('matrix-body');
            tbody.innerHTML = data15.map(item => `
                <tr>
                    <td>${item.name}</td>
                    <td><span class="tag ${getTagClass(item.type)}">${item.type}</span></td>
                    <td class="amount">${item.amount}</td>
                </tr>
            `).join('');
        };
    </script>
</body>
</html>
