<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROL DEL MILLÓN</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path d=%22M50 5 L93 25 L93 75 L50 95 L7 75 L7 25 Z%22 fill=%22%2301060b%22 stroke=%22%2300fa9a%22 stroke-width=%225%22/><text y=%2252%25%22 x=%2250%25%22 dominant-baseline=%22middle%22 font-family=%22sans-serif%22 font-size=%2235%22 font-weight=%22bold%22 fill=%22%2300fa9a%22 text-anchor=%22middle%22>M$</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #010408;
            --bg-panel: rgba(9, 14, 23, 0.75);
            --accent-emerald: #00fa9a;
            --accent-cyan: #00e5ff;
            --accent-amber: #ffb300;
            --text-main: #f3f4f6;
            --text-muted: #8b949e;
            --border-glow: rgba(0, 250, 154, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            min-height: 100vh;
            padding: 1.5rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%; left: -20%; width: 140%; height: 140%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(0, 250, 154, 0.08), transparent 45%),
                radial-gradient(circle at 70% 70%, rgba(0, 143, 88, 0.05), transparent 50%);
            animation: rotateGlow 20s linear infinite;
            z-index: -1;
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.05); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #ffffff;
            animation: textVibrate 2.5s ease-in-out infinite alternate;
        }

        @keyframes textVibrate {
            0% { text-shadow: 0 0 10px rgba(0,250,154,0.3); transform: translateY(0); }
            50% { text-shadow: 0 0 25px rgba(0,250,154,0.8), 0 0 40px rgba(0,229,255,0.4); transform: translateY(-1px); }
            100% { text-shadow: 0 0 10px rgba(0,250,154,0.3); transform: translateY(0); }
        }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 900px) {
            body { padding: 1rem; }
            header { margin-bottom: 1.5rem; }
            .dashboard-layout {
                grid-template-columns: 320px 1fr;
                gap: 2rem;
                align-items: start;
            }
            .control-panel {
                position: sticky;
                top: 1rem; 
            }
        }

        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .tab-slider {
            display: flex;
            background: rgba(4, 9, 15, 0.9);
            border: 1px solid var(--border-glow);
            padding: 0.25rem;
            border-radius: 14px;
            backdrop-filter: blur(10px);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.85rem;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: rgba(0, 250, 154, 0.1);
            color: var(--accent-emerald);
            border: 1px solid rgba(0, 250, 154, 0.3);
            box-shadow: 0 0 15px rgba(0, 250, 154, 0.15);
        }

        .summary-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-glow);
            border-radius: 18px;
            padding: 1.2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(15px);
        }

        .summary-item { margin-bottom: 1rem; }
        .summary-item:last-child { margin-bottom: 0; padding-top: 1rem; border-top: 1px dashed rgba(255,255,255,0.1); }
        
        .summary-item span {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 0.2rem;
        }

        .summary-item p {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .summary-item.green p {
            color: var(--accent-emerald);
            text-shadow: 0 0 15px rgba(0, 250, 154, 0.3);
        }

        .summary-item.red p {
            color: #ff4757;
            text-shadow: 0 0 15px rgba(255, 71, 87, 0.3);
        }

        .items-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
            /* El touch-action ayuda a que el scroll vertical fluya, permitiendo atrapar gestos horizontales */
            touch-action: pan-y; 
        }

        @media (min-width: 1000px) {
            .items-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .card-item {
            background: var(--bg-panel);
            border: 1px solid rgba(255,255,255,0.03);
            border-left: 3px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 0.85rem 1rem; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
        }

        .card-item:hover {
            border-left: 3px solid var(--accent-emerald);
            background: rgba(15, 25, 40, 0.9);
            transform: translateX(3px);
        }

        .card-details {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .card-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #ffffff;
        }

        .tag {
            display: inline-block;
            align-self: flex-start;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tag-seg { background: rgba(0, 229, 255, 0.1); color: var(--accent-cyan); }
        .tag-deuda { background: rgba(255, 179, 0, 0.1); color: var(--accent-amber); }
        .tag-fijo { background: rgba(156, 163, 175, 0.1); color: #d1d5db; }

        .card-amount {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
        }

        .collapsible-wrapper {
            background: rgba(4, 9, 15, 0.5);
            border: 1px dashed rgba(0, 250, 154, 0.3);
            border-radius: 14px;
            overflow: hidden;
        }

        .collapsible-trigger {
            width: 100%;
            background: transparent;
            border: none;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            color: var(--accent-emerald);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .collapsible-content {
            padding: 0 1rem 1rem 1rem;
            display: none;
            flex-direction: column;
            gap: 0.85rem;
            border-top: 1px solid rgba(0, 250, 154, 0.1);
        }

        .future-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 0;
        }
        
        .future-row h4 { font-size: 0.8rem; font-weight: 600; color: #e5e7eb; }
        .future-row p { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.1rem;}
        .future-val { font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--accent-emerald);}

        @keyframes fadeInList {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animated-grid {
            animation: fadeInList 0.3s ease forwards;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>CONTROL DEL MILLÓN</h1>
        </header>

        <div class="dashboard-layout">
            
            <div class="control-panel">
                <div class="tab-slider">
                    <button id="btn-15" class="tab-btn active" onclick="switchQuincena(15)">Corte 15</button>
                    <button id="btn-30" class="tab-btn" onclick="switchQuincena(30)">Corte 30</button>
                </div>

                <div class="summary-card">
                    <div class="summary-item">
                        <span>Ingreso Base</span>
                        <p>₡410,000</p>
                    </div>
                    <div class="summary-item green" id="surplus-container">
                        <span>Balance Neto</span>
                        <p id="surplus-display">₡0</p>
                    </div>
                </div>

                <div class="collapsible-wrapper">
                    <button class="collapsible-trigger" onclick="toggleFuturePanel()">
                        <span>Estructura Independiente</span>
                        <span id="arrow-icon">+</span>
                    </button>
                    <div class="collapsible-content" id="future-panel-content">
                        <div class="future-row">
                            <div>
                                <h4>CCSS Trabajador Independiente</h4>
                                <p>Cuota sobre base mínima</p>
                            </div>
                            <div class="future-val">~₡30,000</div>
                        </div>
                        <div class="future-row">
                            <div>
                                <h4>Facturador Electrónico</h4>
                                <p>Suscripción plataforma</p>
                            </div>
                            <div class="future-val">~₡3,000</div>
                        </div>
                        <div class="future-row">
                            <div>
                                <h4>Retención IVA (13%)</h4>
                                <p>Impuesto cobrado al cliente</p>
                            </div>
                            <div class="future-val" style="color:var(--text-muted);">Variable</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="items-grid" id="flow-wrapper">
                </div>

        </div>
    </div>

    <script>
        // Data Reordenada Arquitectónicamente
        const corte15 = [
            // Bloque: Segregación
            { name: "A Cuenta 2 (Ocio)", type: "Segregación", amount: "₡30,000" },
            { name: "A Cuenta 3 (Gastos del Carro)", type: "Segregación", amount: "₡45,000" },
            { name: "A Cuenta 4 (Objetivo: Tu Millón)", type: "Segregación", amount: "₡5,000" },
            // Bloque: Deuda Fija
            { name: "Tarjetas de Crédito", type: "Deuda Fija", amount: "₡174,000" },
            { name: "Abono Deuda Mamá", type: "Deuda Fija", amount: "₡10,000" },
            // Bloque: Gasto Fijo
            { name: "Comida", type: "Gasto Fijo", amount: "₡50,000" }, // Comida Encabeza Gastos Fijos
            { name: "Cochera", type: "Gasto Fijo", amount: "₡30,000" },
            { name: "Teléfono", type: "Gasto Fijo", amount: "₡43,278" },
            { name: "Teléfono Mamá", type: "Gasto Fijo", amount: "₡12,896" },
            { name: "Google Workspace", type: "Gasto Fijo", amount: "₡6,578" },
            { name: "Seguro SOS", type: "Gasto Fijo", amount: "₡3,200" }
        ];

        const corte30 = [
            // Bloque: Segregación
            { name: "A Cuenta 2 (Ocio)", type: "Segregación", amount: "₡30,000" },
            { name: "A Cuenta 3 (Gastos del Carro)", type: "Segregación", amount: "₡45,000" },
            { name: "A Cuenta 4 (Objetivo: Tu Millón)", type: "Segregación", amount: "₡5,000" },
            // Bloque: Deuda Fija
            { name: "Pago Copecaja", type: "Deuda Fija", amount: "₡115,500" },
            { name: "Pago INS", type: "Deuda Fija", amount: "₡49,000" },
            { name: "Pago Casa (Papá)", type: "Deuda Fija", amount: "₡50,000" },
            { name: "Abono Deuda (Papá)", type: "Deuda Fija", amount: "₡50,000" },
            // Bloque: Gasto Fijo
            { name: "Comida", type: "Gasto Fijo", amount: "₡50,000" } // Comida Cierra
        ];

        let currentTab = 15;

        function parseMonto(montoStr) {
            return parseInt(montoStr.replace(/[^0-9]/g, ''));
        }

        function getTagStyle(type) {
            if (type === "Segregación") return "tag-seg";
            if (type === "Deuda Fija") return "tag-deuda";
            return "tag-fijo";
        }

        function renderMatrix(data) {
            const wrapper = document.getElementById('flow-wrapper');
            const surplusDisplay = document.getElementById('surplus-display');
            const surplusContainer = document.getElementById('surplus-container');
            
            // Calculadora
            const totalGastos = data.reduce((acc, curr) => acc + parseMonto(curr.amount), 0);
            const balance = 410000 - totalGastos;
            
            surplusDisplay.innerText = balance >= 0 ? '+₡' + balance.toLocaleString('en-US') : '-₡' + Math.abs(balance).toLocaleString('en-US');
            
            if(balance < 0) {
                surplusContainer.className = "summary-item red";
            } else {
                surplusContainer.className = "summary-item green";
            }

            wrapper.innerHTML = data.map(item => `
                <div class="card-item">
                    <div class="card-details">
                        <span class="card-title">${item.name}</span>
                        <span class="tag ${getTagStyle(item.type)}">${item.type}</span>
                    </div>
                    <div class="card-amount">${item.amount}</div>
                </div>
            `).join('');
        }

        function switchQuincena(day) {
            if (currentTab === day) return;
            currentTab = day;

            document.getElementById('btn-15').classList.remove('active');
            document.getElementById('btn-30').classList.remove('active');
            document.getElementById(`btn-${day}`).classList.add('active');

            const wrapper = document.getElementById('flow-wrapper');
            wrapper.classList.remove('animated-grid');
            void wrapper.offsetWidth; 
            wrapper.classList.add('animated-grid');

            renderMatrix(day === 15 ? corte15 : corte30);
        }

        function toggleFuturePanel() {
            const content = document.getElementById('future-panel-content');
            const icon = document.getElementById('arrow-icon');
            if (content.style.display === 'flex') {
                content.style.display = 'none';
                icon.innerText = '+';
            } else {
                content.style.display = 'flex';
                icon.innerText = '-';
            }
        }

        // ---- Motor de Gestos (Swipe) para Móvil ----
        let touchstartX = 0;
        let touchendX = 0;
        const SWIPE_THRESHOLD = 60; // Píxeles de deslizamiento necesarios

        function handleGesture() {
            // Deslizó hacia la izquierda
            if (touchendX < touchstartX - SWIPE_THRESHOLD) {
                switchQuincena(30);
            }
            // Deslizó hacia la derecha
            if (touchendX > touchstartX + SWIPE_THRESHOLD) {
                switchQuincena(15);
            }
        }

        const flowWrapper = document.getElementById('flow-wrapper');
        
        flowWrapper.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, {passive: true});

        flowWrapper.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleGesture();
        }, {passive: true});

        // Inicio
        window.onload = () => { renderMatrix(corte15); };
    </script>
</body>
</html>
